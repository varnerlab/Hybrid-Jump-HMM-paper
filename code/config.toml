# config.toml
# Experiment configuration for the hybrid SIM composition study.

[universe]
market_ticker     = "SPY"
min_obs_required  = 2766          # IS window length, matches JDIQ paper

[window]
in_sample_start   = "2014-01-03"
in_sample_end     = "2024-12-31"

[hmm]
N                 = 100             # number of states
nu                = 5.0             # Student-t emission df
risk_free_rate    = 0.0
dt                = 0.003968253968254  # 1/252

[hybrid]
r2_preserve_threshold = 0.80
idiosyncratic_floor   = 0.10

[simulation]
n_paths           = 100           # pilot run; bump to 1000 once headline numbers look right
seed              = 1234
# Seed list for uncertainty quantification (Workstream C1). Leave as a single
# entry to reproduce the original single-seed numbers.
seed_list         = [1234, 2345, 3456, 4567, 5678, 6789, 7890, 8910]

[bootstrap]
# Politis–Romano stationary bootstrap mean block length for the
# compose_block_bootstrap baseline. sqrt(T) ≈ 50 for T = 2766.
mean_block_length = 50

[stress]
# Market-variance scale factors for the clipping stress test (Workstream C3).
# factor = 1.0 reproduces the real SPY path; 2.0 and 3.0 trigger clipping on
# high-β tickers whose idiosyncratic floor (1 - f = 0.90) is exceeded.
factors = [1.0, 2.0, 3.0]

[paths]
# Optional override: where to find the cached JumpHMM market model and per-ticker
# fits from the JDIQ companion paper. If absent, scripts will refit from scratch.
jdiq_root         = "../../julia_work/HMM-w-jumps-paper/code"
